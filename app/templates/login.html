<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SPAR Store Monitor</title>
  <link rel="icon" type="image/png" href="/static/img/tarsyer.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #DA291C;
      --primary-dark: #b91c1c;
      --danger: #ef4444;
      --border: #e5e7eb;
    }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 60%, #ef4444 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .login-box {
      width: 440px; border-radius: 16px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.4); text-align: center;
    }

    .login-header {
      background: linear-gradient(135deg, #991b1b 0%, #dc2626 100%);
      padding: 36px 40px 28px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .login-logo-row {
      display: flex; align-items: center; justify-content: center; gap: 14px;
    }
    .login-logo-row img {
      height: 52px;
      background: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      object-fit: contain;
    }
    .login-logo-sep {
      width: 1px; height: 40px; background: rgba(255,255,255,0.3);
    }
    .login-header h2 {
      font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -.2px;
      margin: 0; text-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
    .login-header p { font-size: 13px; color: rgba(255,255,255,.65); margin: 0; }

    .login-form {
      background: #fff; padding: 32px 36px 28px;
    }
    .login-form input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; margin-bottom: 12px; outline: none; transition: border .2s;
      font-family: inherit;
    }
    .login-form input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(218,41,28,.08); }
    .login-form button {
      width: 100%; padding: 11px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .2s; font-family: inherit;
    }
    .login-form button:hover { background: var(--primary-dark); }
    .login-error {
      color: var(--danger); font-size: 13px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px; justify-content: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo-row">
        <img src="/static/img/spar.png" alt="SPAR"/>
        <div class="login-logo-sep"></div>
        <img src="/static/img/tarsyer.png" alt="Tarsyer"/>
        <div class="login-logo-sep"></div>
        <img src="/static/img/surecountai.png" alt="SureCount AI"/>
      </div>
      <h2>SPAR Store Monitor</h2>
      <p>SPAR Retail Dashboard — Tarsyer AI</p>
    </div>
    <div class="login-form">
      {% with msgs = get_flashed_messages() %}
        {% if msgs %}
          <div class="login-error"><i class="fa-solid fa-circle-exclamation"></i> {{ msgs[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="POST">
        <input type="text" name="username" placeholder="Username" required autofocus/>
        <input type="password" name="password" placeholder="Password" required/>
        <button type="submit">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
